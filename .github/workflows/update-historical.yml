name: Update Historical Data

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily, after FRED publishes previous day's data
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-historical:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill historical data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python backfill_historical_data.py

      - name: Export historical data to JSON
        run: python export_historical_json.py

      - name: Commit and push if data changed
        run: |
          git config user.name "Market Data Bot"
          git config user.email "brendanbiles@gmail.com"
          git add historical_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update historical data - $(date -u +"%Y-%m-%d")" && git push)
