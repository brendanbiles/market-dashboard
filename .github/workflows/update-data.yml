name: Update Market Data

on:
  schedule:
    # Run every 15 minutes during market hours (9:30 AM - 4:00 PM ET, weekdays)
    - cron: '*/15 13-20 * * 1-5'  # UTC times (ET + 4/5 hours depending on DST)
    # Also run every hour outside market hours for international markets
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual triggering
  push:
    branches:
      - main
    paths:
      - 'fetch_data.py'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch current market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "Market Data Bot"
          git config user.email "brendanbiles@gmail.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update market data - $(date -u +"%Y-%m-%d %H:%M UTC")" && git push)
