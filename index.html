<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2f3336;
        }
        
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1d9bf0;
        }
        
        .last-updated {
            color: #71767b;
            font-size: 0.9em;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #16181c;
            border: 1px solid #2f3336;
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.2s;
        }
        
        .card:hover {
            border-color: #1d9bf0;
        }
        
        .card.hero {
            grid-column: 1 / -1;
        }
        
        .card h2 {
            font-size: 1.3em;
            margin-bottom: 16px;
            color: #e7e9ea;
            font-weight: 600;
        }
        
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }
        
        .metric {
            background: #0f1419;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #2f3336;
        }
        
        .metric-label {
            font-size: 0.85em;
            color: #71767b;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #e7e9ea;
        }
        
        .metric-change {
            font-size: 0.9em;
            margin-top: 4px;
        }
        
        .positive {
            color: #00ba7c;
        }
        
        .negative {
            color: #f4212e;
        }
        
        .neutral {
            color: #71767b;
        }
        
        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }
        
        .spread-indicator {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            margin-top: 12px;
        }
        
        .spread-positive {
            background: rgba(0, 186, 124, 0.1);
            color: #00ba7c;
            border: 1px solid #00ba7c;
        }
        
        .spread-negative {
            background: rgba(244, 33, 46, 0.1);
            color: #f4212e;
            border: 1px solid #f4212e;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #71767b;
        }
        
        .spinner {
            border: 3px solid #2f3336;
            border-top: 3px solid #1d9bf0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .chart-container {
                height: 300px;
            }
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #2f3336;
            color: #71767b;
            font-size: 0.85em;
        }
        
        footer a {
            color: #1d9bf0;
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Market Dashboard</h1>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </header>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading market data...</p>
        </div>
        
        <div id="content" style="display: none;">
            <!-- Yield Curve (Hero) -->
            <div class="card hero">
                <h2>🏦 Treasury Yield Curve</h2>
                <div class="chart-container">
                    <canvas id="yieldCurveChart"></canvas>
                </div>
                <div id="spreadIndicator"></div>
            </div>
            
            <!-- Economic Indicators (Full Width) -->
            <div class="card">
                <h2>📊 Economic Indicators</h2>
                <div class="metric-grid" id="economicMetrics"></div>
            </div>
        </div>
        
        <footer>
            <p>Data sources: <a href="https://fred.stlouisfed.org/" target="_blank">FRED</a> & Yahoo Finance</p>
            <p>Auto-refreshes every 60 seconds • Built by <a href="https://github.com/brendanbiles" target="_blank">@brendanbiles</a></p>
        </footer>
    </div>

    <script>
        let yieldCurveChart = null;
        
        // Chart.js default config
        Chart.defaults.color = '#71767b';
        Chart.defaults.borderColor = '#2f3336';
        Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
        
        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                timeZoneName: 'short'
            });
        }
        
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }
        
        function createYieldCurveChart(data) {
            const ctx = document.getElementById('yieldCurveChart').getContext('2d');
            
            // Convert maturity labels to months for proper ordering
            const maturityOrder = ['1M', '3M', '6M', '1Y', '2Y', '3Y', '5Y', '7Y', '10Y', '20Y', '30Y'];
            const labels = [];
            const values = [];
            
            maturityOrder.forEach(maturity => {
                if (data.yield_curve[maturity] !== null) {
                    labels.push(maturity);
                    values.push(data.yield_curve[maturity]);
                }
            });
            
            if (yieldCurveChart) {
                yieldCurveChart.destroy();
            }
            
            yieldCurveChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Yield (%)',
                        data: values,
                        borderColor: '#1d9bf0',
                        backgroundColor: 'rgba(29, 155, 240, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        pointBackgroundColor: '#1d9bf0',
                        pointBorderColor: '#0f1419',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#16181c',
                            borderColor: '#2f3336',
                            borderWidth: 1,
                            padding: 12,
                            titleColor: '#e7e9ea',
                            bodyColor: '#e7e9ea',
                            callbacks: {
                                label: function(context) {
                                    return 'Yield: ' + context.parsed.y.toFixed(2) + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: '#2f3336'
                            },
                            ticks: {
                                color: '#71767b'
                            }
                        },
                        y: {
                            grid: {
                                color: '#2f3336'
                            },
                            ticks: {
                                color: '#71767b',
                                callback: function(value) {
                                    return value.toFixed(1) + '%';
                                }
                            }
                        }
                    }
                }
            });
        }
        
        function renderSpreadIndicator(spread) {
            const container = document.getElementById('spreadIndicator');
            if (spread === null) {
                container.innerHTML = '';
                return;
            }
            
            const isInverted = spread < 0;
            const className = isInverted ? 'spread-negative' : 'spread-positive';
            const label = isInverted ? '⚠️ INVERTED' : '✓ Normal';
            
            container.innerHTML = `
                <div class="spread-indicator ${className}">
                    10Y-2Y Spread: ${spread > 0 ? '+' : ''}${spread}% ${label}
                    ${isInverted ? '(Recession indicator)' : ''}
                </div>
            `;
        }
        

        function renderEconomicMetrics(data) {
            const container = document.getElementById('economicMetrics');
            let html = '';
            
            const indicators = [
                { key: 'unemployment', label: 'Unemployment', suffix: '%' },
                { key: 'cpi_yoy', label: 'CPI (YoY)', suffix: '%' },
                { key: 'fed_funds', label: 'Fed Funds Rate', suffix: '%' }
            ];
            
            indicators.forEach(indicator => {
                const info = data.economic[indicator.key];
                if (info && info.value !== null) {
                    html += `
                        <div class="metric">
                            <div class="metric-label">${indicator.label}</div>
                            <div class="metric-value">${info.value.toFixed(2)}${indicator.suffix}</div>
                            <div class="metric-change neutral">as of ${info.date}</div>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;
        }
        
        function updateDashboard() {
            fetch('data.json?' + new Date().getTime()) // Cache bust
                .then(response => response.json())
                .then(data => {
                    document.getElementById('lastUpdated').textContent = 
                        'Last updated: ' + formatDate(data.last_updated);
                    
                    createYieldCurveChart(data);
                    renderSpreadIndicator(data.spread_10y_2y);
                    renderEconomicMetrics(data);
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    document.getElementById('loading').innerHTML = 
                        '<p style="color: #f4212e;">Error loading data. Retrying...</p>';
                });
        }
        
        // Initial load
        updateDashboard();
        
        // Auto-refresh every 60 seconds
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
